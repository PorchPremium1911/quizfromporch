<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizFromPorch - Premium Online</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #06b6d4;
            --accent: #f472b6;
            --bg: #0f172a;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            margin: 0;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a 50%, #000);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; position: relative; z-index: 1; }
        
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2, h3 { background: linear-gradient(90deg, #fff, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input, textarea, select, button {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: none; outline: none; font-size: 16px;
        }
        input, textarea, select { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        
        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(139, 92, 246, 0.5); }
        button.secondary { background: rgba(255,255,255,0.1); box-shadow: none; }
        button.danger { background: linear-gradient(135deg, #ef4444, #b91c1c); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        
        .quiz-item {
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 20px;
        }
        .quiz-item:hover { background: rgba(255,255,255,0.1); transform: scale(1.02); }
        .quiz-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 15px; }

        .shooting-star {
            position: fixed; width: 2px; height: 2px; background: #fff; border-radius: 50%;
            opacity: 0; pointer-events: none; z-index: 0;
        }
        @keyframes shoot {
            0% { transform: translate(0,0) rotate(30deg) scale(0); opacity: 1; }
            100% { transform: translate(600px, 400px) rotate(30deg) scale(1.5); opacity: 0; }
        }

        .timer { font-size: 2rem; font-weight: bold; text-align: center; color: #fbbf24; text-shadow: 0 0 15px rgba(251,191,36,0.5); }
        
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; border-radius: 50px; z-index: 9999;
            backdrop-filter: blur(10px); animation: slideDown 0.4s ease;
        }
        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }
        .success { background: rgba(16, 185, 129, 0.9); }
        .error { background: rgba(239, 68, 68, 0.9); }

        .top-nav { position: fixed; top: 20px; right: 20px; z-index: 100; display: flex; gap: 10px; }
        .top-nav button { width: auto; padding: 10px 20px; margin: 0; }
        
        .preview-img { width: 100%; max-height: 300px; object-fit: contain; border-radius: 15px; margin: 10px 0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: var(--secondary); }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="secondary" onclick="goHome()">🏠 Home</button>
</div>

<canvas id="particles"></canvas>
<div id="toast-area"></div>

<div class="container" id="main-content">
    <div class="card" style="text-align:center">
        <h1>🚀 QuizFromPorch Online</h1>
        <p>กำลังเชื่อมต่อฐานข้อมูลพรีเมียม...</p>
    </div>
</div>

<script>
// --- 1. FIREBASE CONFIG (จากรูปที่คุณแคปมา) ---
const firebaseConfig = {
  apiKey: "AIzaSyAcRitfsnOhr3kRWT72nzqIU6hFA_LC6nk",
  authDomain: "examfromporch.firebaseapp.com",
  databaseURL: "https://examfromporch-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "examfromporch",
  storageBucket: "examfromporch.firebasestorage.app",
  messagingSenderId: "234413793212",
  appId: "1:234413793212:web:47e3ccc131196bb679d5b9",
  measurementId: "G-LHMQVMGS5T"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- 2. STATE & VARIABLES ---
let state = {
    view: 'home',
    user: null,
    quizzes: [],
    results: [],
    users: [],
    studentCodes: ['Student69'],
    currentQuiz: null,
    answers: [],
    timer: null,
    timeLeft: 0
};

// --- 3. DATABASE SYNC (ดึงข้อมูลจาก Cloud ตลอดเวลา) ---
function initSync() {
    db.ref('/').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        state.quizzes = data.quizzes || [];
        state.results = data.results || [];
        state.users = data.users || [];
        state.studentCodes = data.studentCodes || ['Student69'];
        
        // ถ้าอยู่ที่หน้า Home หรือหน้าที่มีการโหลด ให้รีเฟรชหน้าจอ
        render();
    });
}

async function cloudSave(path, data) {
    try {
        await db.ref(path).set(data);
    } catch (e) {
        showToast("เกิดข้อผิดพลาด: " + e.message, "error");
    }
}

// --- 4. NAVIGATION & CORE UI ---
function render() {
    const root = document.getElementById('main-content');
    if (state.view === 'home') renderHome(root);
    else if (state.view === 'admin-login') renderAdminLogin(root);
    else if (state.view === 'admin-dash') renderAdminDash(root);
    else if (state.view === 'student-auth') renderStudentAuth(root);
    else if (state.view === 'quiz-list') renderQuizList(root);
    else if (state.view === 'quiz-play') renderQuizPlay(root);
}

function goHome() {
    clearInterval(state.timer);
    state.view = 'home';
    render();
}

function showToast(msg, type) {
    const area = document.getElementById('toast-area');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerText = msg;
    area.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// --- 5. VIEWS ---

function renderHome(root) {
    root.innerHTML = `
        <div class="card" style="text-align:center">
            <h1 style="font-size:3.5rem; margin-bottom:10px">✨ QuizFromPorch</h1>
            <p style="font-size:1.2rem; opacity:0.8">ระบบข้อสอบออนไลน์อัจฉริยะ โดย Porch_DevYT</p>
            <div class="grid" style="margin-top:30px">
                <button onclick="state.view='admin-login'; render()">👑 Admin Control</button>
                <button onclick="state.view='student-auth'; render()">🎓 Student Portal</button>
            </div>
        </div>
    `;
}

function renderAdminLogin(root) {
    root.innerHTML = `
        <div class="card" style="max-width:500px; margin:auto">
            <h2>🔐 Admin Access</h2>
            <input type="text" id="admU" placeholder="Admin Username">
            <input type="password" id="admP" placeholder="Password">
            <button onclick="handleAdminLogin()">Login</button>
            <button class="secondary" onclick="goHome()">Back</button>
        </div>
    `;
}

function handleAdminLogin() {
    const u = document.getElementById('admU').value;
    const p = document.getElementById('admP').value;
    if (u === 'PorchTHEADMIN' && p === 'ilovacanva') {
        state.view = 'admin-dash';
        showToast("ยินดีต้อนรับ แอดมินพอร์ช", "success");
        render();
    } else {
        showToast("รหัสไม่ถูกต้อง!", "error");
    }
}

function renderAdminDash(root) {
    root.innerHTML = `
        <div class="card">
            <h2>🛠 แผงควบคุมแอดมิน</h2>
            <div class="grid">
                <button onclick="renderCreateQuiz()">➕ สร้างข้อสอบใหม่</button>
                <button class="danger" onclick="clearResults()">🗑 ล้างประวัติสอบทั้งหมด</button>
            </div>
        </div>
        <div class="card">
            <h3>🔑 Secret Codes (สำหรับสมัครสมาชิก)</h3>
            <div style="display:flex; gap:10px">
                <input id="newCode" placeholder="เพิ่มโค้ดใหม่...">
                <button style="width:auto" onclick="addSecretCode()">Add</button>
            </div>
            <div style="margin-top:10px">
                ${state.studentCodes.map(c => `<span style="background:var(--primary); padding:5px 12px; border-radius:20px; margin-right:5px; font-size:0.9rem">${c}</span>`).join('')}
            </div>
        </div>
        <div class="card">
            <h3>📊 ผลการสอบออนไลน์ล่าสุด</h3>
            <div style="overflow-x:auto">
                <table>
                    <thead><tr><th>ชื่อนักเรียน</th><th>ข้อสอบ</th><th>คะแนน</th><th>วันที่</th></tr></thead>
                    <tbody>
                        ${state.results.map(r => `<tr><td>${r.name}</td><td>${r.quiz}</td><td>${r.score}/${r.total}</td><td>${r.date}</td></tr>`).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

function renderCreateQuiz() {
    const root = document.getElementById('main-content');
    root.innerHTML = `
        <div class="card">
            <h2>📝 ออกข้อสอบใหม่</h2>
            <input id="qTitle" placeholder="ชื่อวิชา / หัวข้อ">
            <input id="qTime" type="number" placeholder="เวลาที่ให้ทำ (นาที)">
            <p>อัปโหลดรูปหน้าปกข้อสอบ (เลือกหรือไม่ก็ได้):</p>
            <input type="file" id="qImg" accept="image/*" onchange="previewImg(this, 'coverPreview')">
            <img id="coverPreview" class="preview-img" style="display:none">
            
            <hr style="border:1px solid rgba(255,255,255,0.1); margin:20px 0">
            <div id="questionsContainer"></div>
            
            <button class="secondary" onclick="addQuestionUI()">➕ เพิ่มคำถาม</button>
            <button onclick="saveQuiz()">🚀 บันทึกและเผยแพร่ออนไลน์</button>
            <button class="danger" onclick="state.view='admin-dash'; render()">ยกเลิก</button>
        </div>
    `;
    addQuestionUI();
}

let currentQuestions = [];
function addQuestionUI() {
    const container = document.getElementById('questionsContainer');
    const qId = Date.now();
    const div = document.createElement('div');
    div.className = 'card';
    div.style.background = 'rgba(0,0,0,0.2)';
    div.innerHTML = `
        <h4>ข้อที่ ${container.children.length + 1}</h4>
        <textarea class="q-text" placeholder="โจทย์คำถาม..."></textarea>
        <p>รูปประกอบคำถาม (ถ้ามี):</p>
        <input type="file" onchange="previewImg(this, 'p-${qId}')">
        <img id="p-${qId}" class="preview-img" style="display:none">
        <div class="grid">
            <input class="choice" placeholder="ตัวเลือก A">
            <input class="choice" placeholder="ตัวเลือก B">
            <input class="choice" placeholder="ตัวเลือก C">
            <input class="choice" placeholder="ตัวเลือก D">
        </div>
        <select class="correct">
            <option value="0">ข้อที่ถูกคือ A</option>
            <option value="1">ข้อที่ถูกคือ B</option>
            <option value="2">ข้อที่ถูกคือ C</option>
            <option value="3">ข้อที่ถูกคือ D</option>
        </select>
    `;
    container.appendChild(div);
}

function previewImg(input, targetId) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById(targetId);
            img.src = e.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}

async function saveQuiz() {
    const title = document.getElementById('qTitle').value;
    const time = document.getElementById('qTime').value;
    const cover = document.getElementById('coverPreview').src || "";
    
    if (!title || !time) return showToast("กรุณากรอกข้อมูลให้ครบ!", "error");

    const qNodes = document.querySelectorAll('#questionsContainer .card');
    const questions = Array.from(qNodes).map(node => {
        return {
            text: node.querySelector('.q-text').value,
            img: node.querySelector('.preview-img').src || "",
            choices: Array.from(node.querySelectorAll('.choice')).map(i => i.value),
            correct: parseInt(node.querySelector('.correct').value)
        };
    });

    const newQuiz = { id: Date.now(), title, time, cover, questions };
    const updated = [...state.quizzes, newQuiz];
    
    await cloudSave('quizzes', updated);
    showToast("บันทึกข้อสอบออนไลน์สำเร็จ!", "success");
    state.view = 'admin-dash';
    render();
}

async function addSecretCode() {
    const code = document.getElementById('newCode').value.trim();
    if (!code) return;
    const updated = [...state.studentCodes, code];
    await cloudSave('studentCodes', updated);
    document.getElementById('newCode').value = "";
}

async function clearResults() {
    if (confirm("ต้องการลบประวัติการสอบทั้งหมดใช่หรือไม่?")) {
        await cloudSave('results', []);
        showToast("ล้างข้อมูลแล้ว", "success");
    }
}

// --- STUDENT LOGIC ---

function renderStudentAuth(root) {
    root.innerHTML = `
        <div class="grid">
            <div class="card">
                <h2>📝 สมัครสมาชิกใหม่</h2>
                <input id="regU" placeholder="ตั้ง Username">
                <input id="regP" type="password" placeholder="ตั้ง Password">
                <input id="regC" placeholder="รหัส Secret Code จากครู">
                <button onclick="handleRegister()">Register</button>
            </div>
            <div class="card">
                <h2>🔑 เข้าสู่ระบบ</h2>
                <input id="logU" placeholder="Username">
                <input id="logP" type="password" placeholder="Password">
                <button onclick="handleLogin()">Login</button>
            </div>
        </div>
        <button class="secondary" onclick="goHome()">Back</button>
    `;
}

async function handleRegister() {
    const u = regU.value.trim(), p = regP.value.trim(), c = regC.value.trim();
    if (!u || !p || !c) return showToast("กรอกข้อมูลไม่ครบ", "error");
    if (!state.studentCodes.includes(c)) return showToast("Secret Code ไม่ถูกต้อง!", "error");
    if (state.users.find(x => x.u === u)) return showToast("ชื่อนี้มีคนใช้แล้ว", "error");

    const updated = [...state.users, { u, p }];
    await cloudSave('users', updated);
    showToast("สมัครสมาชิกสำเร็จ! กรุณาล็อกอิน", "success");
}

function handleLogin() {
    const u = logU.value, p = logP.value;
    const user = state.users.find(x => x.u === u && x.p === p);
    if (user) {
        state.user = u;
        state.view = 'quiz-list';
        showToast("สวัสดีคุณ " + u, "success");
        render();
    } else {
        showToast("ชื่อผู้ใช้หรือรหัสผ่านผิด", "error");
    }
}

function renderQuizList(root) {
    root.innerHTML = `
        <div class="card">
            <h2>📚 ข้อสอบที่เปิดให้ทำตอนนี้</h2>
            <div id="quizContainer">
                ${state.quizzes.map(q => `
                    <div class="quiz-item" onclick="startQuiz(${q.id})">
                        <img src="${q.cover || 'https://via.placeholder.com/100?text=Quiz'}">
                        <div>
                            <h3>${q.title}</h3>
                            <p>เวลา: ${q.time} นาที | จำนวน: ${q.questions.length} ข้อ</p>
                        </div>
                    </div>
                `).join('')}
                ${state.quizzes.length === 0 ? '<p>ยังไม่มีข้อสอบออนไลน์ในขณะนี้...</p>' : ''}
            </div>
            <button class="secondary" onclick="state.user=null; goHome()">Logout</button>
        </div>
    `;
}

function startQuiz(id) {
    const quiz = state.quizzes.find(q => q.id === id);
    state.currentQuiz = quiz;
    state.answers = new Array(quiz.questions.length).fill(null);
    state.view = 'quiz-play';
    state.timeLeft = quiz.time * 60;
    
    state.timer = setInterval(() => {
        state.timeLeft--;
        if (state.timeLeft <= 0) finishQuiz();
        else updateTimerUI();
    }, 1000);
    
    state.currQIndex = 0;
    render();
}

function updateTimerUI() {
    const el = document.getElementById('timer-display');
    if (el) {
        const m = Math.floor(state.timeLeft / 60);
        const s = state.timeLeft % 60;
        el.innerText = `⏰ ${m}:${s < 10 ? '0'+s : s}`;
    }
}

function renderQuizPlay(root) {
    const q = state.currentQuiz.questions[state.currQIndex];
    root.innerHTML = `
        <div class="card">
            <div id="timer-display" class="timer">⏰ --:--</div>
            <hr>
            <h3>ข้อที่ ${state.currQIndex + 1} / ${state.currentQuiz.questions.length}</h3>
            <p style="font-size:1.3rem">${q.text}</p>
            ${q.img ? `<img src="${q.img}" class="preview-img">` : ''}
            
            <div class="grid">
                ${q.choices.map((c, i) => `
                    <button class="${state.answers[state.currQIndex] === i ? '' : 'secondary'}" 
                            onclick="selectAnswer(${i})">
                        ${String.fromCharCode(65+i)}. ${c}
                    </button>
                `).join('')}
            </div>
            
            <div style="display:flex; gap:10px; margin-top:20px">
                <button class="secondary" onclick="prevQ()" ${state.currQIndex === 0 ? 'disabled' : ''}>ก่อนหน้า</button>
                <button onclick="nextQ()">
                    ${state.currQIndex === state.currentQuiz.questions.length - 1 ? 'ส่งข้อสอบ' : 'ถัดไป'}
                </button>
            </div>
        </div>
    `;
    updateTimerUI();
}

function selectAnswer(i) {
    state.answers[state.currQIndex] = i;
    render();
}

function nextQ() {
    if (state.currQIndex < state.currentQuiz.questions.length - 1) {
        state.currQIndex++;
        render();
    } else {
        finishQuiz();
    }
}

function prevQ() {
    if (state.currQIndex > 0) {
        state.currQIndex--;
        render();
    }
}

async function finishQuiz() {
    clearInterval(state.timer);
    let score = 0;
    state.currentQuiz.questions.forEach((q, i) => {
        if (q.correct === state.answers[i]) score++;
    });

    const newResult = {
        name: state.user,
        quiz: state.currentQuiz.title,
        score: score,
        total: state.currentQuiz.questions.length,
        date: new Date().toLocaleString('th-TH')
    };

    const updated = [...state.results, newResult];
    await cloudSave('results', updated);

    document.getElementById('main-content').innerHTML = `
        <div class="card" style="text-align:center">
            <h1>🎊 สอบเสร็จแล้ว!</h1>
            <h2 style="font-size:4rem; color:var(--secondary)">${score} / ${state.currentQuiz.questions.length}</h2>
            <p>คะแนนของคุณถูกบันทึกเข้าระบบเรียบร้อยแล้ว</p>
            <button onclick="state.view='quiz-list'; render()">กลับหน้าวิชา</button>
        </div>
    `;
    
    // สร้าง Confetti แบบง่าย
    for(let i=0; i<50; i++) {
        const c = document.createElement('div');
        c.style.cssText = `position:fixed; width:10px; height:10px; background:hsl(${Math.random()*360},70%,50%); top:-10px; left:${Math.random()*100}vw; z-index:999; border-radius:2px; pointer-events:none;`;
        document.body.appendChild(c);
        c.animate([ {transform:'translateY(0) rotate(0deg)'}, {transform:`translateY(110vh) rotate(${Math.random()*720}deg)`} ], {duration: 2000+Math.random()*2000, easing:'linear'});
        setTimeout(() => c.remove(), 4000);
    }
}

// --- 6. VISUAL EFFECTS ---
function initParticles() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let pts = [];
    for(let i=0; i<60; i++) pts.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, s: Math.random()*0.5});
    function anim() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        pts.forEach(p => {
            p.y -= p.s;
            if (p.y < 0) p.y = canvas.height;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(anim);
    }
    anim();
}

function initShootingStars() {
    setInterval(() => {
        const star = document.createElement('div');
        star.className = 'shooting-star';
        star.style.top = Math.random() * 50 + '%';
        star.style.left = Math.random() * 50 + '%';
        star.style.animation = 'shoot 1s ease-out forwards';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 1000);
    }, 4000);
}

// Start
initSync();
initParticles();
initShootingStars();

</script>
</body>
</html>
